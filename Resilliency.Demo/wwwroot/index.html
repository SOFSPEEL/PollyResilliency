<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Polly Circuit Breaker Demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/styles.css?v=49">
</head>
<body class="closed">
<header>
    <h1>Polly + Refit Circuit Breaker Demo</h1>
    <div class="header-actions">
        <div class="run-status idle" id="runStatus" aria-live="polite">
            <span class="run-status-dot"></span>
            <span id="runStatusText">Idle</span>
        </div>
        <button id="run">Restart</button>
    </div>
</header>
<main>
    <section class="stage container-fluid">
        <div class="diagram row g-3 h-100">
            <div class="diagram-left col-12 col-xl-8 col-xxl-9">
                <div class="circuit-area row g-3 align-items-stretch">
                    <div class="col-12 col-md-2">
                        <div class="node">
                        <div class="node-title">CALLING<br>SERVER</div>
                        </div>
                    </div>
                    <div class="col-12 col-md-8">
                        <div class="wire">
                        <div class="breaker">
                            <div class="switch-line switch-left-wire"></div>
                            <div class="switch-line switch-right-wire"></div>
                            <div class="terminal terminal-left"></div>
                            <div class="terminal terminal-right"></div>
                            <div class="switch-lever"></div>
                            <div class="breaker-label"></div>
                        </div>
                        <div class="flow-status client-output idle" id="flowStatus">What client would see</div>
                        <div class="call-graph" aria-label="Backoff delay by call count">
                            <div class="backoff-time-chart">
                                <div class="backoff-y-axis"><span>16s</span><span>4s</span><span>0s</span></div>
                                <div class="backoff-time-plot" id="backoffBars"></div>
                            </div>
                            <div class="timeline-axis" id="graphAxis"></div>
                        </div>
                        </div>
                    </div>
                    <div class="col-12 col-md-2">
                        <div class="node">
                        <div>
                            <div class="node-title">RESPONDING<br>SERVER</div>
                            <div class="node-status" id="apiStatus">HTTP ---</div>
                        </div>
                        </div>
                    </div>
                </div>
                <div class="diagram-bottom">
                    <div class="status-legend" aria-label="HTTP status legend">
                        <div class="legend-item"><span
                                class="legend-code success">200</span><span>Healthy response</span></div>
                        <div class="legend-item"><span class="legend-code warning">529</span><span>Overloaded, retry with backoff</span>
                        </div>
                        <div class="legend-item"><span class="legend-code error">404</span><span>Not found, fallback apology</span>
                        </div>
                    </div>
                </div>
            </div>
            <aside class="run-log col-12 col-xl-4 col-xxl-3" aria-label="Demo run log">
                <div class="run-log-title">Run Log</div>
                <div class="run-log-list" id="runLog"></div>
            </aside>
        </div>
    </section>
</main>
<script>
    const apiStatus = document.getElementById('apiStatus');
    const flowStatus = document.getElementById('flowStatus');
    const runStatus = document.getElementById('runStatus');
    const runStatusText = document.getElementById('runStatusText');
    const backoffBars = document.getElementById('backoffBars');
    const graphAxis = document.getElementById('graphAxis');
    const runLog = document.getElementById('runLog');
    const totalCallSlots = 10;
    const httpFlashDurationMs = 3200;
    let httpFlashTimer;
    let callCount = 0;
    let lastRetryCallNumber = 0;
    let previousGraphCount = 0;
    let previousBackoffCount = 0;

    function setFlow(mode, text) {
        flowStatus.className = `flow-status client-output ${mode}`;
        flowStatus.textContent = text;
    }

    function setClientWaiting() {
        flowStatus.className = 'flow-status client-output waiting';
        flowStatus.innerHTML = '<span class="client-spinner" aria-hidden="true"></span><span>Spinner waiting for data</span>';
    }

    function flashHttpRequest(text) {
        document.body.classList.add('http-flash');
        clearTimeout(httpFlashTimer);
        httpFlashTimer = setTimeout(() => document.body.classList.remove('http-flash'), httpFlashDurationMs);
    }

    function addGraphBar(status, label) {
        callCount += 1;
        addAxisLabel(label, callCount);

        if (status === '529') {
            lastRetryCallNumber = callCount;
            return;
        }

        addStatusBar(status, label, callCount);
    }

    function addStatusBar(status, label, callNumber) {
        backoffBars.querySelector('.backoff-empty')?.remove();

        const bar = document.createElement('div');
        bar.className = `status-bar status-${status}`;
        bar.style.setProperty('--bar-left', getCallLeft(callNumber));
        bar.title = `HTTP ${status}: ${label} on call ${callNumber}`;
        bar.textContent = status;
        backoffBars.appendChild(bar);
    }

    function addBackoffBar(delayText, statusCode) {
        addBackoffBarAtCall(delayText, statusCode, lastRetryCallNumber);
    }

    function addBackoffBarAtCall(delayText, statusCode, callNumber) {
        const milliseconds = Number(delayText.replace(/,/g, ''));
        if (!Number.isFinite(milliseconds)) return;

        backoffBars.querySelector('.backoff-empty')?.remove();

        const seconds = milliseconds / 1000;
        const bar = document.createElement('div');
        bar.className = 'backoff-bar';
        bar.style.setProperty('--bar-left', getCallLeft(callNumber));
        bar.style.setProperty('--bar-height', `${Math.min(100, (seconds / 16) * 100)}%`);
        bar.innerHTML = `<strong>${statusCode ?? '529'}</strong>`;
        bar.title = `HTTP ${statusCode ?? '529'} retry waits ${formatSeconds(seconds)} after call ${callNumber}`;
        backoffBars.appendChild(bar);
    }

    function addAxisLabel(label, callNumber) {
        const marker = document.createElement('span');
        marker.className = 'axis-label';
        marker.style.setProperty('--bar-left', getCallLeft(callNumber));
        marker.textContent = label;
        marker.title = `Call ${callNumber}: ${label}`;
        graphAxis.appendChild(marker);
    }

    function getCallLeft(callNumber) {
        return `${Math.min(100, Math.max(0, ((callNumber - 1) / totalCallSlots) * 100))}%`;
    }

    function formatSeconds(seconds) {
        return `${seconds.toLocaleString(undefined, {maximumFractionDigits: 1})}s`;
    }

    function applyCircuitState(state, canSendHttp) {
        const normalized = normalizeCircuitState(state);
        if (!normalized) return;
        setState(normalized);
    }

    function normalizeCircuitState(state) {
        if (state === null || state === undefined) return null;
        if (typeof state === 'number') {
            if (state === 0) return 'Closed';
            if (state === 1) return 'Open';
            if (state === 2) return 'HalfOpen';
            return null;
        }

        return state;
    }

    function applyUiStateChanged(data) {
        setRunStatus(Boolean(data.IsRunning ?? data.isRunning));
        applyCircuitState(data.CircuitState, data.SendingHttp);

        if (Number.isFinite(data.ApiStatusCode)) {
            setApiStatus(data.ApiStatusCode);
        } else {
            setApiStatus(null);
        }

        const events = data.Events ?? data.events ?? [];
        const graphEntries = events.filter(isGraphEvent);
        const backoffEntries = events.filter(isBackoffEvent);
        const logEntries = events.filter(isLogEvent);

        renderGraphState(graphEntries, backoffEntries);
        renderRunLog(logEntries);

        if (graphEntries.length > previousGraphCount) {
            const latest = graphEntries[graphEntries.length - 1];
            const latestStatusCode = Number(latest.StatusCode ?? latest.statusCode);
            setClientResult(latestStatusCode);
            flashHttpRequest('HTTP request reached STATUS API');
        }

        if (backoffEntries.length > previousBackoffCount) {
            setClientWaiting();
        }

        previousGraphCount = graphEntries.length;
        previousBackoffCount = backoffEntries.length;

        if (data.FallbackMessage) {
            setFallback();
        }
    }

    function getEventType(entry) {
        return entry.Type ?? entry.type ?? '';
    }

    function isGraphEvent(entry) {
        return getEventType(entry) === 'graph';
    }

    function isBackoffEvent(entry) {
        return getEventType(entry) === 'backoff';
    }

    function isLogEvent(entry) {
        return getEventType(entry) === 'log';
    }

    function renderGraphState(graphEntries, backoffEntries) {
        resetBackoffGraph();

        graphEntries.forEach(entry => {
            const callNumber = Number(entry.CallNumber ?? entry.callNumber);
            const statusCode = Number(entry.StatusCode ?? entry.statusCode);
            const label = entry.Label ?? entry.label ?? `HTTP ${statusCode}`;
            if (!Number.isFinite(callNumber) || !Number.isFinite(statusCode)) return;

            callCount = Math.max(callCount, callNumber);
            addAxisLabel(label, callNumber);
            if (statusCode === 529) {
                lastRetryCallNumber = callNumber;
                return;
            }

            addStatusBar(String(statusCode), label, callNumber);
        });

        backoffEntries.forEach(entry => {
            const callNumber = Number(entry.CallNumber ?? entry.callNumber);
            const statusCode = Number(entry.StatusCode ?? entry.statusCode);
            const delayMs = Number(entry.DelayMs ?? entry.delayMs);
            if (!Number.isFinite(callNumber) || !Number.isFinite(statusCode) || !Number.isFinite(delayMs)) return;
            addBackoffBarAtCall(String(delayMs), String(statusCode), callNumber);
        });
    }

    function setState(next) {
        const css = next.toLowerCase();
        document.body.classList.remove('closed', 'open', 'halfopen', 'fallback');
        document.body.classList.add(css === 'halfopen' ? 'halfopen' : css);
    }

    function setRunStatus(isRunning) {
        runStatus.classList.toggle('running', isRunning);
        runStatus.classList.toggle('idle', !isRunning);
        runStatusText.textContent = isRunning ? 'Running' : 'Idle';
    }

    function setFallback() {
        document.body.classList.remove('closed', 'open', 'halfopen');
        document.body.classList.add('fallback');
        setFlow('apology', 'Apology: We are working to bring our system back up ASAP');
    }

    function setClientResult(statusCode) {
        if (statusCode === 200) {
            setFlow('success', 'All good');
            return;
        }

        if (statusCode === 529) {
            setClientWaiting();
            return;
        }

        if (statusCode === 404) {
            setFlow('apology', 'Apology: We are working to bring our system back up ASAP');
            return;
        }

        if (Number.isFinite(statusCode) && statusCode >= 400) {
            setFlow('apology', 'Apology: We are working to bring our system back up ASAP');
        }
    }

    function getHttpColor(statusCode) {
        if (statusCode === 200) return 'var(--green)';
        if (statusCode === 529) return 'var(--amber)';
        if (statusCode >= 400) return 'var(--red)';
        return 'var(--blue)';
    }

    function setApiStatus(statusCode) {
        if (Number.isFinite(statusCode)) {
            apiStatus.textContent = `HTTP ${statusCode}`;
            document.body.style.setProperty('--http-line-color', getHttpColor(statusCode));
        } else {
            apiStatus.textContent = 'HTTP ---';
            document.body.style.removeProperty('--http-line-color');
        }

        apiStatus.classList.remove('ok', 'warning', 'error');
        if (!Number.isFinite(statusCode)) {
            return;
        }

        if (statusCode === 529) {
            apiStatus.classList.add('warning');
            return;
        }

        apiStatus.classList.add(statusCode >= 400 ? 'error' : 'ok');
    }

    function renderRunLog(logEntries) {
        if (!runLog) {
            return;
        }

        runLog.replaceChildren();
        if (!logEntries.length) {
            const empty = document.createElement('div');
            empty.className = 'run-log-empty';
            empty.textContent = 'Run events appear here';
            runLog.appendChild(empty);
            return;
        }

        logEntries.forEach(entry => {
            const item = document.createElement('div');
            item.className = 'run-log-item';
            const timestamp = entry.Timestamp ?? entry.timestamp ?? '--:--:--.---';
            const message = entry.Message ?? entry.message ?? '';
            item.textContent = `${timestamp} | ${message}`;
            runLog.appendChild(item);
        });

        runLog.scrollTop = runLog.scrollHeight;
    }

    let source;

    window.addEventListener('load', clearViewAfterPageLoad);
    document.getElementById('run').addEventListener('click', restartScenario);

    async function clearViewAfterPageLoad() {
        resetScenarioView();
        await fetch('/clear', {method: 'POST'});
        connectEventStream();
    }

    function connectEventStream() {
        source = new EventSource('/events');
        source.onmessage = event => {
            const data = JSON.parse(event.data);
            applyUiStateChanged(data);
        };
    }

    async function restartScenario() {
        resetScenarioView();
        setRunStatus(true);
        await fetch('/restart', {method: 'POST'});
    }

    function resetScenarioView() {
        clearTimeout(httpFlashTimer);
        document.body.classList.remove('http-flash');
        setFlow('idle', 'What client would see');
        resetBackoffGraph();
        renderRunLog([]);
    }


    function resetBackoffGraph() {
        callCount = 0;
        lastRetryCallNumber = 0;
        backoffBars.querySelectorAll('.backoff-bar, .status-bar').forEach(bar => bar.remove());
        graphAxis.replaceChildren();
    }
</script>
</body>
</html>
